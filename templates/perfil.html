{% extends 'base.html' %}

{% block title %}Perfil — Cafeteria{% endblock %}

{% block content %}
<div class="page-wrapper">
    <div class="profile-card text-center">
        <img src="{{ user.profileImageUrl }}" alt="Foto de perfil de {{ user.username }}" class="profile-avatar mb-3">
        <h1>Bem-vindo, {{ user.username }}!</h1>
        <p class="text-muted mb-4">Que tal um cafezinho para começar?</p>
        <div class="d-flex flex-column flex-sm-row gap-2 justify-content-center">
            <a href="{{ url_for('menu') }}" class="btn btn-cafe">
                <i class="bi bi-cup-hot me-1"></i>Ver o Menu
            </a>
            <a href="{{ url_for('gerenciap') }}" class="btn btn-outline-cafe">
                <i class="bi bi-gear me-1"></i>Configurar Perfil
            </a>
            <a href="{{ url_for('index') }}" class="btn btn-outline-cafe">
                <i class="bi bi-house-door me-1"></i>Página Inicial
            </a>
        </div>
    </div>
</div>
{% endblock %}
