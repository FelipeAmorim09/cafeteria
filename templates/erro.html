{% extends 'base.html' %}

{% block title %}{{ codigo }} — Cafeteria{% endblock %}

{% block content %}
<div class="erro-wrapper">

        <div class="erro-codigo">{{ codigo }}</div>
        <h1 class="mb-2">{{ titulo }}</h1>
